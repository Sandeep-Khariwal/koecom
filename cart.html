<!DOCTYPE html>
<html lang="ko">
<head>

  <title>장바구니 · 라크숍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

<body class="cart-page">

  <div class="promo-bar">
    인도 직구 <strong>무료배송</strong> 특가 진행 중
  </div>

  <header class="site-header">
    <div class="container header-top">
      <a href="index.html" class="logo">라크<span>숍</span></a>

      <form class="search-box" action="#" method="get" role="search">
        <input type="search" placeholder="상품 검색" aria-label="검색">
        <button type="submit">검색</button>
      </form>

      <div class="header-actions">
        <a href="login.html" class="icon-btn">로그인</a>
        <a href="cart.html" class="icon-btn">
          장바구니
          <span class="badge">2</span>
        </a>
      </div>
    </div>
  </header>

  <main class="cart-main">
    <div class="cart-layout container">
      <a href="index.html" class="back-home">← 쇼핑 계속하기</a>
      <h1>장바구니</h1>

      <table class="cart-table">
        <thead>
          <tr>
            <th>상품</th>
            <th>상품명</th>
            <th>가격</th>
            <th>수량</th>
            <th>합계</th>

        </thead>
        <tbody>
          <tr>
            <td>
              <div class="cart-item-img">IMG</div>
            </td>
            <td>인도산 헤나 파우더 200g</td>
            <td>₩18,900</td>
            <td>1</td>
            <td>₩18,900</td>
          </tr>
          <tr>
            <td>
              <div class="cart-item-img">IMG</div>
            </td>
            <td>다림차이 어썸 아쌈 티 250g</td>
            <td>₩22,500</td>
            <td>1</td>
            <td>₩22,500</td>
          </tr>
        </tbody>
      </table>

      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>상품금액</span>
          <span>₩41,400</span>
        </div>
        <div class="cart-summary-row">
          <span>배송비</span>
          <span>무료</span>
        </div>
        <div class="cart-summary-row cart-summary-total">
          <span>결제 예정 금액</span>
          <span>₩41,400</span>
        </div>

        <div class="cart-actions">
          <a href="index.html" class="btn-outline">쇼핑 계속하기</a>
          <a href="login.html" class="btn-checkout">주문하기</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p>상호: 주식회사 랑쥬메디션 | 고객센터: 070-8065-4169 | 평일 09:00 - 17:00</p>
    </div>
  </footer>

</body>
</html>
