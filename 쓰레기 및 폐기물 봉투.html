<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <link rel="stylesheet" href="쓰레기 및 폐기물 봉투.css">
</head>
<body>

<div class="container">

    <!-- Product Image -->
    <div class="product-image">
        <img src="C:\Users\fenil\Downloads\Homelove Small Trash Bags - 4 Gallon 150 Counts, Unscented Thick Garbage Bags Wastebasket Bin Liners Plastic Trash Bags for Home Waste Bin,Bathroom Bedroom Office Kitchen Trash Can Liners(3 Rolls).jpg" alt="Product">
    </div>

    <!-- Product Details -->
    <div class="product-details">

        <h2>쓰레기 및 폐기물 봉투</h2>

        <p class="info">구성 : 네하 헤나 콘 30GX 12개 팩</p>
        <p class="info">원산지 : 인도</p>
        <p class="info">카테고리 : 생활용품</p>

        <div class="price">
            <span class="sale-price">₩11,500</span>
        </div>

        <div class="details">
            <p>배송비 : 2,500원</p>
            <p>배송기간 : 1~3일</p>
        </div>

        <!-- Quantity -->
        <div class="quantity">
            <span>수량</span>
            <button>-</button>
            <input type="text" value="1">
            <button>+</button>
        </div>

        <!-- Total Price -->
        <div class="total">
            <span>총 상품 금액</span>
            <strong>₩11,500</strong>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="cart-btn">장바구니</button>
            <button class="buy-btn">바로구매</button>
        </div>

    </div>

</div>

</body>
</html>
