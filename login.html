<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 라크숍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-page">

  <div class="promo-bar">
    인도 직구 <strong>무료배송</strong> 특가 진행 중
  </div>

  <header class="site-header">
    <div class="container header-top">
      <a href="index.html" class="logo">라크<span>숍</span></a>
      <div class="header-actions">
        <a href="index.html" class="icon-btn">홈으로</a>
        <a href="cart.html" class="icon-btn">장바구니</a>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <a href="index.html" class="back-home">← 메인으로 돌아가기</a>
      <h1>로그인</h1>
      <p class="subtitle">라크숍 회원 로그인</p>

      <form action="index.html" method="get">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>

      <p class="auth-links">
        계정이 없으신가요? <a href="#">회원가입</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p>상호: 주식회사 랑쥬메디션 | 고객센터: 070-8065-4169</p>
    </div>
  </footer>

</body>
</html>
